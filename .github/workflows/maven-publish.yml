name: Maven Package

on:
  release:
    types: [created]
  push:
    branches: [master]   # Or your main branch
  workflow_dispatch:     # Manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        server-id: github   # must match <distributionManagement><repository><id> in pom.xml
        settings-path: ${{ github.workspace }}

    # Build and deploy incident-service
    - name: Build incident-service
      run: mvn -B package --file incident-service/pom.xml

    - name: Deploy incident-service
      run: mvn deploy -s $GITHUB_WORKSPACE/settings.xml --file incident-service/pom.xml
      env:
        GITHUB_TOKEN: ${{ github.token }}

    # Build and deploy incident-consumer
    - name: Build incident-consumer
      run: mvn -B package --file incident-consumer/pom.xml

    - name: Deploy incident-consumer
      run: mvn deploy -s $GITHUB_WORKSPACE/settings.xml --file incident-consumer/pom.xml
      env:
        GITHUB_TOKEN: ${{ github.token }}
