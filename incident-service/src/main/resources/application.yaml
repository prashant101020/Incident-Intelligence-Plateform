server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:mem:incidents
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: incident-group
      auto-offset-reset: earliest